<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
  background: linear-gradient(135deg, #13131e,#13131e);
  color: #f0f0f0;
}
        .parent{
            display:grid;
            border-color:black;
         
             grid-template-rows:auto;
            gap:5px;
          margin-left: 650px;
            width:12%;
            margin-top:200px;
            justify-content:center;
            align-items:center;
            height:40%;
            margin-top:90px;
            background-color: rgb(59, 59, 59);
         box-shadow: 0 0 15px rgba(80, 80, 82, 0.6);
           border-radius: 10px;
        }
        

.child{
    display: flex;
  justify-content: center;
  align-items: center;
}
        button{
            width: 40px;
            height:40px;
            border-radius:25%;
            margin:none;
            cursor:pointer;
            color:white;
            background-color:#373636;
            border:none;
            transition: all 0.2s ease-in-out;
        }
        button:hover{
            background-color: rgb(47, 47, 47);
            
        }
        input{
            width: 65%;
            height: 40px;
            border-radius: 5px;
            background:transparent;
            border:none;
            color:white;
            text-align:right;
            font-size:20px;
            outline:none;
            transition: box-shadow 0.3s ease;
        }
        h2{
            margin:none;
            color:white;
            font-size: 20px;
            font-family: sans-serif;
          text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
button:active {
  transform: scale(0.9);
  background-color: #222;
}
    
input:focus {
  box-shadow: 0 0 2px #8e8787;
}
    </style>
</head>
<body>
 

  <div class="parent">

    <div class="child">
   <h2>Basic Calculator</h2>
</div>

<div class="child">
   <input type="text">
    <button title="Backspace">⌫</button>
</div>

<div class="child">
    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button title="All Clear">AC</button>
</div>
<div class="child">
     <button>4</button>
    <button>5</button>
    <button>6</button>
    <button title="Subtract">-</button>
</div>
<div class="child">
     <button>7</button>
    <button>8</button>
    <button>9</button>
    <button title="Multiply">*</button>
</div>
<div class="child">
     <button>/</button>
    <button>0</button>
    <button>.</button>
    <button title="Add">+</button>
</div>
<div class="child">
     <button title="remainder">%</button>
    <button title="Open Parenthesis">(</button>
    <button title="Close Parenthesis">)</button>
    <button title="Equals">=</button>
</div>
    </div>


    
    <script>
        let body=document.querySelector("body");
        let input=document.querySelector("input");

    
input.addEventListener("input",(e)=>
{
    if(e.target.value=="Error")
        {
            input.value="";
        }
})

        body.addEventListener("click",function(e){

             if(e.target.innerHTML=="AC"){
                input.value="";
            }
            else if(e.target.innerHTML=="⌫"){
                  input.value=input.value.slice(0,-1);
            }
            
            else if(e.target.innerHTML=="="){
                try{
                    input.value=eval(input.value);
                }
                catch(err){
                    input.value="Error";
                }
            }
            else if(e.target.tagName=="BUTTON"){
                input.value+=e.target.innerHTML;
            }
            else{
                return;
            }
        })
       

input.addEventListener("keydown",(e)=>
{
  if (e.key=="Enter") {
    e.preventDefault();  
    if(input.value=="")
    {
      input.value="";
       return;
    }
    try 
    {
      input.value = eval(input.value);  
    } 
    catch(err) 
    {
      input.value="";      
    }
  }
});

    </script>
</body>
</html>
