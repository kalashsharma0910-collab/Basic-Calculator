<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="cal_style.css">
</head>
<body>
 

  <div class="parent">

    <div class="child">
   <h2>Basic Calculator</h2>
</div>

<div class="child">
   <input type="text" autofocus>
    <button title="Backspace">⌫</button>
</div>

<div class="child">
    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button title="All Clear">AC</button>
</div>
<div class="child">
     <button>4</button>
    <button>5</button>
    <button>6</button>
    <button title="Subtract">-</button>
</div>
<div class="child">
     <button>7</button>
    <button>8</button>
    <button>9</button>
    <button title="Multiply">*</button>
</div>
<div class="child">
     <button>/</button>
    <button>0</button>
    <button>.</button>
    <button title="Add">+</button>
</div>
<div class="child">
     <button title="remainder">%</button>
    <button title="Open Parenthesis">(</button>
    <button title="Close Parenthesis">)</button>
    <button title="Equals">=</button>
</div>
    </div>


    
  <script src="cal_js.js"></script>
</body>
</html>
